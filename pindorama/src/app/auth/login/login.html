<div class="login-page">

  <div class="login-card">

    <!-- Logo -->
    <div class="login-card__logo">
      <app-araku-pytxa class="login-card__glyph" [size]="28"></app-araku-pytxa>
      <span class="login-card__wordmark">PINDORAMA</span>
    </div>

    <h1 class="login-card__title">Welcome back</h1>

    <!-- Form -->
    <form class="login-form" (submit)="onSubmit($event)" novalidate>

      <!-- Email -->
      <label class="login-form__label" for="login-email">Email</label>
      <input
        class="login-form__input"
        [class.login-form__input--error]="emailError"
        id="login-email"
        type="email"
        placeholder="you@example.com"
        [(ngModel)]="email"
        name="email"
        autocomplete="email"
        [disabled]="submitting()">
      @if (emailError) {
        <p class="login-form__error">{{ emailError }}</p>
      }

      <!-- Password -->
      <label class="login-form__label" for="login-password">Password</label>
      <input
        class="login-form__input"
        [class.login-form__input--error]="passwordError"
        id="login-password"
        type="password"
        placeholder="Your password"
        [(ngModel)]="password"
        name="password"
        autocomplete="current-password"
        [disabled]="submitting()">
      @if (passwordError) {
        <p class="login-form__error">{{ passwordError }}</p>
      }

      <!-- Submit -->
      <button
        class="login-form__btn"
        type="submit"
        [disabled]="submitting()">
        @if (submitting()) {
          <span class="login-form__spinner"></span>
        } @else {
          Log In
        }
      </button>

      @if (serverError()) {
        <p class="login-form__server-error">{{ serverError() }}</p>
      }
    </form>

    <!-- Signup link -->
    <p class="login-card__alt">
      Don't have an account?
      <a class="login-card__link" routerLink="/signup">Sign up</a>
    </p>

  </div>

</div>
