<app-nav></app-nav>

<div class="pack-opening">

  <!-- ── Mystical aura behind sealed pack ─────────────────── -->
  <div class="aura" *ngIf="showPack()"
    [class.aura--tearing]="phase() === 'tearing' || phase() === 'shaking'"
    [class.aura--torn]="phase() === 'torn'">
    <div class="aura__glow"></div>
    <div class="aura__ring"></div>
    <div class="aura__runes"></div>
    <div class="aura__particles"></div>
  </div>

  <!-- ── Tear-open burst ──────────────────────────────────── -->
  <div class="burst" *ngIf="showBurst()" [@burstAnim]>
    <div class="burst__shockwave"></div>
    <div class="burst__flash"></div>
    <div class="burst__rays"></div>
    <div class="burst__sparks"></div>
  </div>

  <!-- ── Pack ──────────────────────────────────────────────── -->
  <div class="pack" *ngIf="showPack()" [@packAnim]
    [@packShake]="isShaking() ? 'shaking' : 'idle'"
    (@packShake.done)="onShakeDone()">
    <div class="pack__foil"
      [class.pack__foil--torn]="phase() === 'torn'">

      <!-- Glow visible through the torn opening -->
      <div class="pack__inner-glow"
        [style.opacity]="tearProgress() / 150">
      </div>

      <!-- Pack artwork -->
      <div class="pack__art">
        <div class="pack__emblem">&#x2B21;</div>
        <h2 class="pack__title">The First Peoples</h2>
        <p class="pack__subtitle">TUP-1</p>
      </div>

      <!-- Lid (tears away from left to right) -->
      <div class="pack__lid"
        [class.pack__lid--completing]="tearCompleting()"
        [style.clip-path]="lidClipPath()">
      </div>

      <!-- Score line (visual tear guide) -->
      <div class="pack__score"></div>
    </div>

    <!-- Invisible drag target over top portion -->
    <div class="pack__tear-zone"
      (pointerdown)="onTearStart($event)"
      (pointermove)="onTearMove($event)"
      (pointerup)="onTearEnd()">
    </div>

    <!-- Animated drag cue -->
    <div class="pack__cue" *ngIf="phase() === 'sealed'">
      <span class="pack__cue-text">drag to open</span>
      <span class="pack__cue-arrow">&rarr;</span>
    </div>
  </div>

  <!-- ── Cards row ─────────────────────────────────────────── -->
  <div class="cards-row"
    *ngIf="showCards()"
    [@cardsRow]="flyingAway() ? 'fly' : 'show'">
    <div
      *ngFor="let card of cards(); let i = index; trackBy: trackById"
      class="card-slot"
      [class.card-slot--repeat]="card.isRepeat"
      [@cardErupt]="{ value: 'in', params: { delay: i * 120, rot: (i - 2) * 12 } }"
      [@rareGlow]="glowState(i)">
      <app-card [card]="card" [isFlipped]="!isRevealed(i)" (clicked)="openLightbox(card, i)"></app-card>
      @if (card.isRepeat && isRevealed(i)) {
        <span class="repeat-badge" aria-label="Duplicate card">
          <svg class="repeat-badge__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M7 7h10v3l5-4-5-4v3H5v6h2V7zm10 10H7v-3l-5 4 5 4v-3h12v-6h-2v4z"/>
          </svg>
          <span class="repeat-badge__text">Duplicate</span>
        </span>
      }
    </div>
  </div>

  <!-- ── Done button ───────────────────────────────────────── -->
  <button
    class="done-btn"
    *ngIf="showDone()"
    [@fadeIn]
    (click)="onDone()">
    Collect Cards
  </button>

</div>

<!-- ── Card lightbox ──────────────────────────────────────── -->
<app-card-lightbox
  [card]="selectedCard()"
  (close)="closeLightbox()">
</app-card-lightbox>
