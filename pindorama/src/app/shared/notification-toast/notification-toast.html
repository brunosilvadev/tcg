@if (notification(); as n) {
  <button
    type="button"
    class="notification-toast notification-toast--{{ n.kind }}"
    [attr.aria-label]="n.message"
    (click)="dismiss()">
    <span class="notification-toast__icon" aria-hidden="true">
      @if (n.kind === 'success') {
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
      }
    </span>
    <span class="notification-toast__text">{{ n.message }}</span>
  </button>
}
