<!-- ── Top navigation (desktop) ──────────────────────────────── -->
<nav class="top-nav" aria-label="Main navigation">
  <div class="top-nav__inner">
    <span class="top-nav__brand">Pindorama</span>
    <div class="top-nav__links">
      <a class="top-nav__item" routerLink="/home"
        routerLinkActive="top-nav__item--active"
        [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a class="top-nav__item" routerLink="/cards"
        routerLinkActive="top-nav__item--active">My Collection</a>
      <a class="top-nav__item" routerLink="/collection/tupinamba"
        routerLinkActive="top-nav__item--active">Nations</a>
      <a class="top-nav__item top-nav__item--open-pack"
        [class.top-nav__item--pack-ready]="packService.hasAvailablePack()"
        [class.top-nav__item--pack-spent]="!packService.hasAvailablePack()"
        [routerLink]="packService.hasAvailablePack() ? '/pack-opening' : null"
        routerLinkActive="top-nav__item--active"
        [attr.aria-disabled]="!packService.hasAvailablePack()">Open Pack</a>
      <a class="top-nav__item" routerLink="/profile"
        routerLinkActive="top-nav__item--active">Profile</a>
      <span class="top-nav__flames" aria-label="Daily flames progress">
        <svg class="top-nav__flames-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2 C 9 6, 6 9, 6 14 C 6 17.5, 8.5 20, 12 20 C 15.5 20, 18 17.5, 18 14 C 18 11, 16 9, 14 7 C 14 9, 13 10, 12 10 C 12 8, 13 5, 12 2 Z"/>
        </svg>
        <span class="top-nav__flames-count">{{ flames() }}/{{ flamesGoal() }}</span>
      </span>
    </div>
  </div>
</nav>

<!-- ── Bottom navigation (mobile) ────────────────────────────── -->
<nav class="bottom-nav" aria-label="Main navigation">

  <a class="bottom-nav__item" routerLink="/home"
    routerLinkActive="bottom-nav__item--active"
    [routerLinkActiveOptions]="{ exact: true }">
    <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
    <span class="bottom-nav__label">Home</span>
  </a>

  <a class="bottom-nav__item" routerLink="/cards"
    routerLinkActive="bottom-nav__item--active">
    <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0
        1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4
        4H9v-2h6v2zm4-8H9V5h10v2z"/>
    </svg>
    <span class="bottom-nav__label">My Collection</span>
  </a>

  <a class="bottom-nav__item" routerLink="/collection/tupinamba"
    routerLinkActive="bottom-nav__item--active">
    <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12
        2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0
        1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55
        0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8
        3.97-2.1 5.39z"/>
    </svg>
    <span class="bottom-nav__label">Nations</span>
  </a>

  <a class="bottom-nav__item bottom-nav__item--open-pack"
    [class.bottom-nav__item--pack-ready]="packService.hasAvailablePack()"
    [class.bottom-nav__item--pack-spent]="!packService.hasAvailablePack()"
    [routerLink]="packService.hasAvailablePack() ? '/pack-opening' : null"
    routerLinkActive="bottom-nav__item--active"
    [attr.aria-disabled]="!packService.hasAvailablePack()">
    <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 1 3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0
        4 5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/>
    </svg>
    <span class="bottom-nav__label">Open Pack</span>
  </a>

  <a class="bottom-nav__item" routerLink="/profile"
    routerLinkActive="bottom-nav__item--active">
    <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0
        2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
    </svg>
    <span class="bottom-nav__label">Profile</span>
  </a>

</nav>

<!-- Mobile flame indicator floats at the top so nav stays compact -->
<div class="flame-indicator" aria-label="Daily flames progress">
  <svg class="flame-indicator__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M12 2 C 9 6, 6 9, 6 14 C 6 17.5, 8.5 20, 12 20 C 15.5 20, 18 17.5, 18 14 C 18 11, 16 9, 14 7 C 14 9, 13 10, 12 10 C 12 8, 13 5, 12 2 Z"/>
  </svg>
  <span class="flame-indicator__count">{{ flames() }}/{{ flamesGoal() }}</span>
</div>
