@if (reward(); as r) {
  <button
    type="button"
    class="reward-toast reward-toast--{{ r.kind }}"
    [attr.aria-label]="r.message"
    (click)="dismiss()">
    <span class="reward-toast__icon" aria-hidden="true">
      @if (r.kind === 'flame') {
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2 C 9 6, 6 9, 6 14 C 6 17.5, 8.5 20, 12 20 C 15.5 20, 18 17.5, 18 14 C 18 11, 16 9, 14 7 C 14 9, 13 10, 12 10 C 12 8, 13 5, 12 2 Z"/>
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 1 3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4 5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/>
        </svg>
      }
    </span>
    <span class="reward-toast__text">{{ r.message }}</span>
  </button>
}
