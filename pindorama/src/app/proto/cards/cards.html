<div class="cards-page">

  <header class="cards-page__header">
    <h1 class="cards-page__title">Card Collection</h1>
    <p class="cards-page__meta">
      TUP-1: The First Peoples &middot;
      {{ hasAnyFilter() ? filteredCards().length + ' / ' + allCards.length : allCards.length }} cards
    </p>
  </header>

  <!-- ── Search ───────────────────────────────────────────────── -->
  <div class="cards-search">
    <input
      class="cards-search__input"
      type="search"
      placeholder="Search cards…"
      [value]="searchQuery()"
      (input)="searchQuery.set($any($event.target).value)"
      autocomplete="off"
      spellcheck="false"
      aria-label="Search cards">
    @if (hasSearch()) {
      <button class="cards-search__clear" (click)="clearSearch()" aria-label="Clear search">✕</button>
    }
  </div>

  <!-- ── Rarity filter bar ──────────────────────────────────── -->
  <div class="cards-filter">
    <button
      *ngIf="hasFilter()"
      class="cards-filter__btn cards-filter__btn--show-all"
      (click)="clearFilter()">
      Show All
    </button>
    <button
      *ngFor="let r of rarities"
      class="cards-filter__btn cards-filter__btn--{{ r.value }}"
      [class.is-active]="isActive(r.value)"
      (click)="toggleRarity(r.value)">
      {{ r.label }}
    </button>
  </div>

  <div class="cards-grid" *ngIf="filteredCards().length > 0; else empty">
    <app-card
      *ngFor="let card of filteredCards(); trackBy: trackById"
      [card]="card"
      (clicked)="openLightbox($event)"
    ></app-card>
  </div>

  <ng-template #empty>
    <div class="cards-empty">
      <span class="cards-empty__glyph">✦</span>
      @if (hasAnyFilter()) {
        <p class="cards-empty__title">No cards match your search</p>
        <button class="cards-empty__clear" (click)="clearAll()">Show All</button>
      } @else {
        <p class="cards-empty__title">Your collection is empty</p>
        <p class="cards-empty__sub">Open a booster pack to begin your journey.</p>
      }
    </div>
  </ng-template>

</div>

<app-card-lightbox
  [card]="selectedCard"
  (close)="closeLightbox()"
></app-card-lightbox>

<app-footer></app-footer>
