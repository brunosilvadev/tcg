<div class="cards-page">

  <header class="cards-page__header">
    <h1 class="cards-page__title">Card Collection</h1>
    <p class="cards-page__meta">
      TUP-1: The First Peoples &middot;
      {{ hasFilter() ? filteredCards().length + ' / ' + allCards.length : allCards.length }} cards
    </p>
  </header>

  <!-- ── Rarity filter bar ──────────────────────────────────── -->
  <div class="cards-filter">
    <button
      *ngIf="hasFilter()"
      class="cards-filter__btn cards-filter__btn--show-all"
      (click)="clearFilter()">
      Show All
    </button>
    <button
      *ngFor="let r of rarities"
      class="cards-filter__btn cards-filter__btn--{{ r.value }}"
      [class.is-active]="isActive(r.value)"
      (click)="toggleRarity(r.value)">
      {{ r.label }}
    </button>
  </div>

  <div class="cards-grid" *ngIf="filteredCards().length > 0; else empty">
    <app-card
      *ngFor="let card of filteredCards(); trackBy: trackById"
      [card]="card"
      (clicked)="openLightbox($event)"
    ></app-card>
  </div>

  <ng-template #empty>
    <div class="cards-empty">
      <span class="cards-empty__glyph">✦</span>
      <ng-container *ngIf="hasFilter(); else collectionEmpty">
        <p class="cards-empty__title">No cards match the selected filter</p>
        <button class="cards-empty__clear" (click)="clearFilter()">Show All</button>
      </ng-container>
      <ng-template #collectionEmpty>
        <p class="cards-empty__title">Your collection is empty</p>
        <p class="cards-empty__sub">Open a booster pack to begin your journey.</p>
      </ng-template>
    </div>
  </ng-template>

</div>

<app-card-lightbox
  [card]="selectedCard"
  (close)="closeLightbox()"
></app-card-lightbox>

<app-footer></app-footer>
