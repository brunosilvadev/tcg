<div
  class="lightbox"
  [class.lightbox--open]="card !== null"
  (click)="onBackdropClick($event)"
  role="dialog"
  aria-modal="true"
>
  <div
    *ngIf="card"
    class="lightbox__drag-wrap"
    [class.lightbox__drag-wrap--dragging]="isDragging"
    [class.lightbox__drag-wrap--returning]="isReturning"
    [style.transform]="dragTransform"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp()"
    (click)="$event.stopPropagation()"
  >
    <!-- Float + glow layer -->
    <div
      class="lightbox__float-inner"
      [class.lightbox__float-inner--paused]="isDragging || isReturning"
      [style.--glow]="glowColor"
    >
      <!--
        Tilt layer — separate from float so the two transforms never conflict.
        Mouse events live here; drag events on the outer wrap capture the pointer.
      -->
      <div
        class="lightbox__tilt-wrap"
        [class.lightbox__tilt-wrap--tilting]="tiltX !== 0 || tiltY !== 0"
[style.transform]="tiltTransform"
        [style.--shine-x.%]="shineX"
        [style.--shine-y.%]="shineY"
        (mousemove)="onTiltMouseMove($event)"
        (mouseleave)="onTiltMouseLeave()"
      >
        <app-card [card]="card" [isFlipped]="isFlipped"></app-card>
      </div>
    </div>
  </div>
</div>
