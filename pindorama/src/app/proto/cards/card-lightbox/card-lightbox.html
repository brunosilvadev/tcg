<div
  class="lightbox"
  [class.lightbox--open]="card !== null"
  (click)="onBackdropClick($event)"
  role="dialog"
  aria-modal="true"
>
  <div
    *ngIf="card"
    class="lightbox__drag-wrap"
    [class.lightbox__drag-wrap--dragging]="isDragging"
    [class.lightbox__drag-wrap--returning]="isReturning"
    [style.transform]="dragTransform"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp()"
    (click)="$event.stopPropagation()"
  >
    <!--
      Float and glow live on a separate inner element so that
      translate (drag) and translateY (float) never conflict.
    -->
    <div
      class="lightbox__float-inner"
      [class.lightbox__float-inner--paused]="isDragging || isReturning"
      [style.--glow]="glowColor"
    >
      <app-card [card]="card" [flipEnabled]="true"></app-card>
    </div>
  </div>
</div>
